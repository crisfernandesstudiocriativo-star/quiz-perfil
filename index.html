<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seu perfil bíblico — Papeleira Criativa</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --creme: #F5F0E8;
  --creme-escuro: #ECE3D3;
  --dourado: #C9A84C;
  --marrom: #3B2A1A;
  --marrom-suave: #6B5540;
}

body {
  font-family: 'Georgia', serif;
  background: var(--creme);
  color: var(--marrom);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1rem 4rem;
}

.logo {
  font-size: 13px;
  letter-spacing: 0.15em;
  color: var(--dourado);
  text-transform: uppercase;
  margin-bottom: 2.5rem;
  text-align: center;
}

.card {
  background: #FFFDF9;
  border: 1px solid rgba(201, 168, 76, 0.35);
  border-radius: 16px;
  max-width: 480px;
  width: 100%;
  padding: 2.5rem 2rem;
  text-align: center;
}

.intro {
  font-size: 13px;
  color: var(--dourado);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.nome-usuario {
  font-size: 15px;
  color: var(--marrom-suave);
  margin-bottom: 1.5rem;
}

.perfil-icone {
  width: 56px;
  height: 56px;
  margin: 0 auto 1rem;
  display: block;
  object-fit: contain;
}

.perfil-nome {
  font-size: 32px;
  font-weight: normal;
  color: var(--marrom);
  margin-bottom: 0.25rem;
  letter-spacing: 0.02em;
}

.perfil-tag {
  font-size: 13px;
  color: var(--dourado);
  font-style: italic;
  margin-bottom: 1.75rem;
}

.divider {
  width: 40px;
  height: 1px;
  background: var(--dourado);
  margin: 0 auto 1.75rem;
}

.perfil-desc {
  font-size: 15px;
  line-height: 1.85;
  color: var(--marrom);
  margin-bottom: 1.75rem;
  text-align: left;
}

.versiculo {
  background: var(--creme-escuro);
  border-left: 3px solid var(--dourado);
  padding: 1rem 1.25rem;
  margin-bottom: 1.75rem;
  text-align: left;
  border-radius: 0 8px 8px 0;
}

.versiculo p {
  font-size: 14px;
  font-style: italic;
  color: var(--marrom-suave);
  line-height: 1.7;
  margin-bottom: 0.25rem;
}

.versiculo span {
  font-size: 12px;
  color: var(--dourado);
  font-style: normal;
}

.cta-box {
  background: var(--creme-escuro);
  border-radius: 12px;
  padding: 1.25rem;
  margin-bottom: 0;
}

.cta-label {
  font-size: 11px;
  color: var(--dourado);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
}

.cta-text {
  font-size: 14px;
  color: var(--marrom);
  line-height: 1.6;
  margin-bottom: 1rem;
}

.cta-btn {
  display: inline-block;
  background: var(--marrom);
  color: var(--creme);
  font-size: 13px;
  padding: 0.75rem 1.75rem;
  border-radius: 50px;
  text-decoration: none;
  letter-spacing: 0.05em;
  font-family: 'Georgia', serif;
}

.rodape {
  margin-top: 2rem;
  font-size: 12px;
  color: var(--dourado);
  text-align: center;
}

.loading {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--marrom-suave);
  font-size: 15px;
  font-style: italic;
}

.erro {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--marrom-suave);
}
</style>
</head>
<body>

<div class="logo">Papeleira Criativa</div>

<div id="conteudo">

<div class="rodape">papeleiracriativa.com.br</div>

  },
  "Viúva de Sarepta": {
    tag: "O perfil da generosidade extrema",
    icone: "icones/viuva-de-sarepta.png",
    desc: "Você age com uma fé que vai além do que é razoável — e é exatamente aí que os milagres acontecem. A viúva de Sarepta partilhou o seu último punhado de farinha mesmo sem saber o que haveria amanhã, e essa obediência radical mudou sua história. Você carrega essa disposição de confiar mais em Deus do que nas circunstâncias. No seu negócio, sua entrega e autenticidade criam vínculos profundos com quem recebe o seu trabalho.",

function calcularPerfil(respostas) {
  const pontos = {};
  Object.keys(perfis).forEach(p => pontos[p] = 0);

  // Mapeamento v2 — 07/07/2026 — revisado tematicamente pela Ester e reequilibrado pela Lídia
  // Alinhado ao texto real das perguntas do Google Forms; todos os 11 perfis entre ~6% e ~11% de chance
  const mapa = [
    // P1 — Como você age quando alguém está passando por dificuldades?
    { A: ["Dorcas","Marta"], B: ["Ester"], C: ["Débora","Lídia"], D: ["Rute","Mulher Sunamita"] },
    // P2 — No seu negócio, o que mais te move?
    { A: ["Dorcas"], B: ["Rainha de Sabá"], C: ["Débora","Rainha de Sabá"], D: ["Lídia"] },
    // P3 — Quando os recursos são escassos, qual é sua postura?
    { A: ["Viúva do Azeite","Viúva de Sarepta"], B: ["Lídia","Abigail"], C: ["Ester"], D: ["Viúva do Azeite","Viúva de Sarepta"] },
    // P4 — Como as pessoas costumam te descrever?
    { A: ["Mulher Sunamita"], B: ["Abigail"], C: ["Rute"], D: ["Marta"] },
    // P5 — Qual frase ressoa com seu momento agora?
    { A: ["Viúva de Sarepta"], B: ["Ester"], C: ["Débora","Rainha de Sabá"], D: ["Viúva do Azeite","Rute"] },
    // P6 — O que você mais valoriza numa comunidade de mulheres?
    { A: ["Viúva de Sarepta","Dorcas"], B: ["Rainha de Sabá"], C: ["Débora","Lídia"], D: ["Rute"] },
    // P7 — Qual seu maior desafio como empreendedora cristã?
    { A: ["Mulher Sunamita","Dorcas"], B: ["Abigail"], C: ["Marta"], D: ["Viúva do Azeite","Mulher Sunamita"] }
  ];

  respostas.forEach((resp, i) => {
    if (resp && mapa[i] && mapa[i][resp]) {
      mapa[i][resp].forEach(p => { pontos[p] = (pontos[p] || 0) + 1; });
    }
  });

  // Desempate determinístico e não-tendencioso: mesma resposta sempre dá o mesmo resultado,
  // mas nenhum perfil é sistematicamente favorecido em empates (antes "Rute" sempre vencia).
  function hashCode(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) >>> 0; }
    return h;
  }

  let seed = hashCode(respostas.join(''));
  const entries = Object.entries(pontos);
  for (let i = entries.length - 1; i > 0; i--) {
    seed = (seed * 1103515245 + 12345) >>> 0;
    const j = seed % (i + 1);
    [entries[i], entries[j]] = [entries[j], entries[i]];
  }
  entries.sort((a, b) => b[1] - a[1]);
  return entries[0][0];
}

function renderPerfil(nome, perfilNome) {
  const p = perfis[perfilNome];
  if (!p) return;

  document.getElementById('conteudo').innerHTML = `
    <div class="card">
      <p class="intro">Seu perfil bíblico</p>
      ${nome ? `<p class="nome-usuario">${nome},</p>` : ''}
      <img class="perfil-icone" src="${p.icone}" alt="" onerror="this.style.display='none'">
      <h1 class="perfil-nome">${perfilNome}</h1>
      <p class="perfil-tag">${p.tag}</p>
      <div class="divider"></div>
      <p class="perfil-desc">${p.desc}</p>
      <div class="versiculo">
        <p>${p.versiculo}</p>
        <span>— ${p.ref}</span>
      </div>
      <div class="cta-box">
        <p class="cta-label">Seu planner</p>
        <p class="cta-text">${p.cta}</p>
        <a href="${linkCheckout()}" class="cta-btn">Conheça o planner →</a>
      </div>
    </div>
  `;
}

function mostrarErro() {
  document.getElementById('conteudo').innerHTML = `
    <div class="erro">
      <p style="font-size:15px;color:var(--marrom-suave);font-style:italic">Não foi possível carregar o resultado.<br>Por favor, tente novamente.</p>
    </div>`;
}

// Lê parâmetros da URL: ?nome=Maria&r1=A&r2=B&r3=C&r4=D&r5=A&r6=B&r7=C&utm_source=instagram&utm_medium=stories&utm_campaign=quiz
const params = new URLSearchParams(window.location.search);
const nome = params.get('nome') || '';
const respostas = ['r1','r2','r3','r4','r5','r6','r7'].map(k => params.get(k));

// Repassa UTM/origem de quem entrou no quiz para o link de checkout da Kiwify,
// assim a venda fica rastreada de ponta a ponta (Stories/Post/Pin -> Quiz -> Compra)
function linkCheckout() {
  const base = "https://pay.kiwify.com.br/ZDbndZz";
  const camposRastreio = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','src'];
  const presentes = camposRastreio.filter(c => params.get(c));
  if (presentes.length === 0) return base;
  const query = presentes.map(c => `${c}=${encodeURIComponent(params.get(c))}`).join('&');
  return `${base}?${query}`;
}

if (respostas.some(r => r)) {
  const perfil = calcularPerfil(respostas);
  renderPerfil(nome, perfil);
} else {
  // Modo demonstração — mostra Ester como exemplo
  renderPerfil('Maria', 'Ester');
}
</script>
