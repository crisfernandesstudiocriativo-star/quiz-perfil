<style>

    text-align: left;

  .versiculo p {
    font-size: 14px;

    color: #9b8c7a;

<div class="rodape">papeleiracriativa.com.br</div>

<script>

  "Viúva do Azeite": {
    tag: "O perfil da fé no escasso",
    desc: "Você sabe o que é começar com pouco e ainda assim avançar. A viúva do azeite tinha apenas uma pequena vasilha — mas obedeceu, agiu e viu o milagre acontecer. Você tem essa fé corajosa que não espera ter tudo resolvido para dar o próximo passo. No seu negócio, você é criativa diante das limitações, fiel no processo e determinada a multiplicar o que Deus colocou em suas mãos — mesmo quando parece insuficiente.",
    versiculo: "\"Vai vender o azeite, paga a tua dívida e vive com teus filhos do restante.\"",
    ref: "2 Reis 4:7",
    cta: "O Planner Viúva do Azeite vai te ajudar a organizar cada recurso com sabedoria e transformar o que você tem hoje na base do que você quer construir."
  },
  "Viúva de Sarepta": {
    tag: "O perfil da generosidade extrema",
    desc: "Você age com uma fé que vai além do que é razoável — e é exatamente aí que os milagres acontecem. A viúva de Sarepta partilhou o seu último punhado de farinha mesmo sem saber o que haveria amanhã, e essa obediência radical mudou sua história. Você carrega essa disposição de confiar mais em Deus do que nas circunstâncias. No seu negócio, sua entrega e autenticidade criam vínculos profundos com quem recebe o seu trabalho.",

  },
  "Mulher Sunamita": {
    tag: "O perfil da fé que espera",
    desc: "Você acredita mesmo quando não vê — e essa fé silenciosa e firme é uma das forças mais poderosas que existem. A mulher Sunamita construiu, serviu, perdeu e não desistiu: foi buscar o seu milagre com serenidade e certeza. Você tem essa paz profunda diante das esperas e das incertezas da vida. No seu negócio, você não age por desespero — age por convicção. E é exatamente essa calma que te faz tomar as melhores decisões nos momentos mais desafiadores.",

    desc: "Você tem o coração de Dorcas — uma mulher que transformava o que tinha em suas mãos em amor concreto pelas pessoas ao redor. Dorcas não esperava grandes recursos para agir: ela costurava, servia e cuidava com excelência e dedicação. No seu negócio, o seu maior diferencial é exatamente isso: a capacidade de tocar vidas de forma genuína através do que você cria e entrega. Você não vende apenas produtos — você oferece cuidado.",

  "Lídia": {
    tag: "O perfil da empreendedora pioneira",
    desc: "Você é a mulher que abre portas — para si mesma e para quem vem depois. Lídia era comerciante, dona do próprio negócio, e a primeira convertida na Europa. Ela não esperava condições perfeitas: abriu sua casa, investiu no evangelho e construiu uma comunidade ao redor de tudo que acreditava. Você tem esse espírito pioneiro que combina fé com ação, negócio com propósito, e prosperidade com generosidade. Seu negócio é um ministério.",

    versiculo: "\"Abigail era de boa inteligência e de formosa aparência.\"",
    ref: "1 Samuel 25:3",
    cta: "O Planner Abigail foi desenhado para mulheres de visão clara e ação sábia — com estrutura para tomar decisões com tranquilidade e propósito."
  },
  "Débora": {
    tag: "O perfil da liderança profética",
    desc: "Você nasceu para liderar — e lidera com fé, firmeza e visão. Débora era juíza, profetisa e guerreira: não esperava permissão para ocupar o espaço que lhe foi dado por Deus. Você tem essa voz que mobiliza, essa clareza que orienta e essa coragem que inspira outras mulheres a avançarem. No seu negócio, você não apenas empreende — você abre caminhos. Sua presença é um marco. Seu propósito é maior do que você.",
    versiculo: "\"Levantei-me, Débora, levantei-me como mãe em Israel.\"",
    ref: "Juízes 5:7",
    cta: "O Planner Débora foi pensado para líderes que precisam de estrutura à altura da sua visão — com planejamento estratégico, espaço para missão e organização de quem move multidões."
  }
};

function calcularPerfil(respostas) {
  const pontos = {};
  Object.keys(perfis).forEach(p => pontos[p] = 0);

  // Mapeamento reequilibrado em 06/07/2026 (correção de distorção: Rute 34% / Abigail 0% / Priscila removida)
  // ATENÇÃO Ester: os pares opção→perfil abaixo foram reorganizados para equilibrar a distribuição.
  // Revisar se ainda fazem sentido temático com o texto real das perguntas no Google Forms.
  const mapa = [
    // P1
    { A: ["Rute","Marta"], B: ["Rainha de Sabá","Viúva do Azeite"], C: ["Viúva de Sarepta","Mulher Sunamita"], D: ["Dorcas"] },
    // P2
    { A: ["Lídia"], B: ["Ester","Abigail"], C: ["Rute"], D: ["Marta","Rainha de Sabá"] },
    // P3
    { A: ["Viúva do Azeite","Rute"], B: ["Viúva de Sarepta","Mulher Sunamita"], C: ["Dorcas","Lídia"], D: ["Ester"] },
    // P4
    { A: ["Abigail"], B: ["Débora"], C: ["Marta"], D: ["Rainha de Sabá","Viúva do Azeite"] },
    // P5
    { A: ["Viúva de Sarepta"], B: ["Mulher Sunamita","Dorcas"], C: ["Lídia","Ester"], D: ["Abigail","Débora"] },
    // P6
    { A: ["Rute"], B: ["Rainha de Sabá","Débora"], C: ["Viúva do Azeite"], D: ["Viúva de Sarepta"] },
    // P7
    { A: ["Mulher Sunamita","Dorcas"], B: ["Lídia"], C: ["Ester","Abigail"], D: ["Débora"] }
  ];

  respostas.forEach((resp, i) => {
    if (resp && mapa[i] && mapa[i][resp]) {
      mapa[i][resp].forEach(p => { pontos[p] = (pontos[p] || 0) + 1; });
    }
  });

  // Desempate determinístico e não-tendencioso: mesma resposta sempre dá o mesmo resultado,
  // mas nenhum perfil é sistematicamente favorecido em empates (antes "Rute" sempre vencia).
  function hashCode(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) >>> 0; }
    return h;
  }
  let seed = hashCode(respostas.join(''));
  const entries = Object.entries(pontos);
  for (let i = entries.length - 1; i > 0; i--) {
    seed = (seed * 1103515245 + 12345) >>> 0;
    const j = seed % (i + 1);
    [entries[i], entries[j]] = [entries[j], entries[i]];
  }
  entries.sort((a, b) => b[1] - a[1]);
  return entries[0][0];
}

function renderPerfil(nome, perfilNome) {
  const p = perfis[perfilNome];
  if (!p) return;
  document.getElementById('conteudo').innerHTML = `
    <div class="card">
      <p class="intro">Seu perfil bíblico</p>
      ${nome ? `<p class="nome-usuario">${nome},</p>` : ''}
      <h1 class="perfil-nome">${perfilNome}</h1>
      <p class="perfil-tag">${p.tag}</p>
      <div class="divider"></div>
      <p class="perfil-desc">${p.desc}</p>
      <div class="versiculo">
        <p>${p.versiculo}</p>
        <span>— ${p.ref}</span>
      </div>
      <div class="cta-box">
        <p class="cta-label">Seu planner</p>
        <p class="cta-text">${p.cta}</p>
       <a href="https://pay.kiwify.com.br/ZDbndZz" class="cta-btn">Conheça o planner →</a>
      </div>
    </div>
  `;
}

function mostrarErro() {
  document.getElementById('conteudo').innerHTML = `
    <div class="erro">
      <p style="font-size:15px;color:#9b8c7a;font-style:italic">Não foi possível carregar o resultado.<br>Por favor, tente novamente.</p>
    </div>`;
}

// Lê parâmetros da URL: ?nome=Maria&r1=A&r2=B&r3=C&r4=D&r5=A&r6=B&r7=C
const params = new URLSearchParams(window.location.search);
const nome = params.get('nome') || '';
const respostas = ['r1','r2','r3','r4','r5','r6','r7'].map(k => params.get(k));

if (respostas.some(r => r)) {
  const perfil = calcularPerfil(respostas);
  renderPerfil(nome, perfil);
} else {
  // Modo demonstração — mostra Ester como exemplo
  renderPerfil('Maria', 'Ester');
}
</script>
</body>
</html>
